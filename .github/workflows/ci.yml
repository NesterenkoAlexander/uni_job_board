name: Node.js CI for Uni Job Board

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код проекта
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Устанавливаем Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # 3. Создаем временный файл .env для тестов
    - name: Create env file
      run: |
        cp .env.example .env

    # 4. Чистая установка зависимостей
    - name: Install dependencies
      run: npm ci

    # 5. Проверяем, что скрипт наполнения базы данных (seed) работает без ошибок
    - name: Run database seed
      run: npm run seed

    # 6. Проверяем синтаксис главного файла app.js на ошибки
    - name: Check app.js syntax
      run: node --check app.js
